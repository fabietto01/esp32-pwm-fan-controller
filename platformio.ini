; ============================================================
;  ESP32 PWM Fan Controller
;  Board: ESP32 (generico)
; ============================================================

[platformio]
default_envs = fan_controller
src_dir       = src
extra_configs = secrets.ini   ; WiFi credentials — file is gitignored, see secrets.ini.example

; ---- Impostazioni comuni a tutti gli environment ----
[env]
platform  = espressif32
framework = arduino
board     = esp32dev

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

upload_port = COM5

; ============================================================
;  env:fan_controller  — Progetto principale
;  Controllo temperatura + display OLED + rilevamento stallo
; ============================================================
[env:fan_controller]
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
